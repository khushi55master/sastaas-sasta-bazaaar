<!DOCTYPE html>
<html>
<head>
<title>Sasta-Bazaar&reg;</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(to right,#ffe6f0,#e6f7ff);
}

/* HEADER */

.header{
background:#ff4d4d;
color:white;
text-align:center;
padding:18px;
font-size:32px;
font-weight:bold;
}

/* CART */

.cart{
position:fixed;
top:10px;
right:15px;
background:white;
padding:8px 15px;
border-radius:8px;
font-weight:bold;
}

/* SEARCH */

.search-area{
text-align:center;
padding:15px;
background:#fff3cd;
}

.search-area input{
width:300px;
padding:10px;
border-radius:5px;
border:1px solid gray;
}

.search-area button{
padding:10px;
background:orange;
border:none;
cursor:pointer;
}

/* CATEGORY BAR */

.category-bar{
display:flex;
justify-content:center;
background:#333;
}

.category-bar div{
color:white;
padding:12px 20px;
cursor:pointer;
}

.category-bar div:hover{
background:#ff4d4d;
}

/* SUBCATEGORY BAR */

.sub-bar{
display:flex;
justify-content:center;
background:#555;
color:white;
}

.sub-bar div{
padding:8px 15px;
}

/* SLIDER */

.slider{
width:100%;
height:250px;
overflow:hidden;
}

.slider img{
width:100%;
height:250px;
object-fit:cover;
}

/* PRODUCTS */

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.product-card{
background:white;
width:200px;
margin:15px;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 3px 8px gray;
transition:0.3s;
}

.product-card:hover{
transform:scale(1.05);
}

.product-card img{
width:150px;
height:150px;
object-fit:cover;
}

.price{
color:#e60023;
font-size:18px;
}

.sale{
background:red;
color:white;
padding:3px 6px;
font-size:12px;
}

button{
background:#FFD814;
border:none;
padding:8px 15px;
margin-top:5px;
cursor:pointer;
}

button:hover{
background:#f7ca00;
}

/* FOOTER */

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<div class="header">Sasta-Bazaar®</div>

<div class="cart">🛒 Cart: <span id="cartCount">0</span></div>

<!-- SEARCH -->

<div class="search-area">
<input type="text" id="searchInput" placeholder="Search products">
<button onclick="searchProduct()">🔍</button>
</div>

<!-- CATEGORY -->

<div class="category-bar">
<div>Women</div>
<div>Men</div>
<div>Teens</div>
<div>Clothes</div>
<div>Electronics</div>
<div>Mall</div>
</div>

<div class="sub-bar">
<div>Mobiles</div>
<div>Kurtis</div>
<div>Pants</div>
<div>Panties</div>
<div>Shorts</div>
</div>

<!-- IMAGE SLIDER -->

<div class="slider">
<img id="slideImage" src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1200">
</div>

<!-- PRODUCTS -->

<div class="products" id="productList">

<div class="product-card">
<span class="sale">SALE</span>
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=200">
<h3>Smartphone</h3>
<p class="price">₹8999</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="product-card">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200">
<h3>Smart Watch</h3>
<p class="price">₹1999</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="product-card">
<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52?w=200">
<h3>Kurti</h3>
<p class="price">₹699</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="product-card">
<img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=200">
<h3>Jeans</h3>
<p class="price">₹999</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="product-card">
<img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=200">
<h3>Headphones</h3>
<p class="price">₹1499</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="product-card">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=200">
<h3>Shorts</h3>
<p class="price">₹399</p>
<button onclick="addCart()">Add to Cart</button>
</div>

</div>

<footer>
© 2026 Sasta-Bazaar | Beginner Project
</footer>

<script>

/* CART */

let cart=0;

function addCart(){
cart++;
document.getElementById("cartCount").innerText=cart;
}

/* SEARCH */

function searchProduct(){

let input=document.getElementById("searchInput").value.toLowerCase();
let items=document.getElementsByClassName("product-card");

for(let i=0;i<items.length;i++){

let name=items[i].innerText.toLowerCase();

if(name.includes(input)){
items[i].style.display="block";
}else{
items[i].style.display="none";
}

}

}

/* IMAGE SLIDER */

let images=[
"https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1200",
"https://images.unsplash.com/photo-1522199710521-72d69614c702?w=1200",
"https://images.unsplash.com/photo-1515165562835-c4c3f8f3c1a5?w=1200"
];

let i=0;

setInterval(function(){

i++;

if(i>=images.length){
i=0;
}

document.getElementById("slideImage").src=images[i];

},3000);

</script>

</body>
</html>
